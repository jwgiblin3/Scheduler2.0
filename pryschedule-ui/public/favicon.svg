<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#667eea"/>
  <!-- Calendar body -->
  <rect x="5" y="9" width="22" height="18" rx="2" fill="white"/>
  <!-- Header bar -->
  <rect x="5" y="9" width="22" height="7" rx="2" fill="#5a67d8"/>
  <rect x="5" y="13" width="22" height="3" fill="#5a67d8"/>
  <!-- Hanger pegs -->
  <rect x="10" y="6" width="3" height="5" rx="1.5" fill="white"/>
  <rect x="19" y="6" width="3" height="5" rx="1.5" fill="white"/>
  <!-- Grid dots (days) -->
  <rect x="8"  y="20" width="3" height="3" rx="0.5" fill="#667eea"/>
  <rect x="13" y="20" width="3" height="3" rx="0.5" fill="#667eea"/>
  <rect x="18" y="20" width="3" height="3" rx="0.5" fill="#667eea"/>
  <rect x="8"  y="25" width="3" height="3" rx="0.5" fill="#c3dafe"/>
  <rect x="13" y="25" width="3" height="3" rx="0.5" fill="#667eea"/>
  <rect x="18" y="25" width="3" height="3" rx="0.5" fill="#667eea"/>
  <rect x="23" y="20" width="3" height="3" rx="0.5" fill="#c3dafe"/>
</svg>
