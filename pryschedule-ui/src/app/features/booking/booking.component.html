<div class="booking-page">
  <div class="booking-header" [style.background]="bannerColor()">
    <div class="header-inner">
      <a class="practice-brand"
         [attr.href]="website()"
         [attr.target]="website() ? '_blank' : null"
         [attr.rel]="website() ? 'noopener' : null">
        @if (logoUrl()) {
          <img class="practice-logo" [src]="logoUrl()" [alt]="displayName() + ' logo'" />
        }
        <div class="practice-identity">
          <span class="practice-name">{{ displayName() }}</span>
          @if (addressLine(); as a) {
            <span class="practice-address">{{ a }}</span>
          }
        </div>
      </a>
      <div class="header-spacer"></div>
      @if (auth.isLoggedIn()) {
        <a class="header-link" routerLink="/my/appointments">My Appointments</a>
        <span class="header-user">{{ auth.currentUser()?.firstName }}</span>
      } @else {
        <a class="header-link"
           [routerLink]="['/login']"
           [queryParams]="{ returnUrl: returnUrl() }">Sign in</a>
      }
    </div>
  </div>

  <app-booking-widget [slug]="slug" />
</div>
