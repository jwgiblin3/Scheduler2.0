
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">📅 ProSchedule</div>
        <h2>Sign in to your practice</h2>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label>Email</label>
            <input type="email" formControlName="email" placeholder="you@practice.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" formControlName="password" placeholder="••••••••" />
          </div>
          @if (error) {
            <div class="alert-error">{{ error }}</div>
          }
          <button type="submit" class="btn-primary" [disabled]="loading">
            {{ loading ? 'Signing in...' : 'Sign In' }}
          </button>
        </form>
        <p class="auth-footer">New client? <a routerLink="/my/register">Create a client account</a></p>
        <p class="auth-footer-alt">Own a practice? <a routerLink="/register">Register a practice</a></p>
      </div>
    </div>
